services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: mpol-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Creates the default bucket on first run
  minio_init:
    image: minio/mc:latest
    container_name: mpol-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/arktrace
      "

  dashboard:
    build: .
    container_name: mpol-dashboard
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      VALIDATION_METRICS_PATH: data/processed/validation_metrics.json
      ALERT_CONFIDENCE_THRESHOLD: "0.75"
      ALERT_POLL_INTERVAL: "60"
      # S3-compatible object storage (MinIO for local, real S3/R2/GCS in cloud)
      S3_BUCKET: ${S3_BUCKET:-arktrace}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    volumes:
      - ./data:/app/data   # DuckDB working file stays local
    depends_on:
      minio_init:
        condition: service_completed_successfully
    command: ["uv", "run", "uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--log-level", "debug"]

  pipeline:
    build: .
    env_file:
      - .env
    environment:
      # S3-compatible object storage
      S3_BUCKET: ${S3_BUCKET:-arktrace}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    volumes:
      - ./data:/app/data   # DuckDB working file stays local
    depends_on:
      minio_init:
        condition: service_completed_successfully
    profiles:
      - pipeline
    command: >
      uv run python scripts/run_pipeline.py
      --region ${PIPELINE_REGION:-singapore}
      --non-interactive
      --seed-dummy
      ${PIPELINE_STREAM_DURATION:+--stream-duration ${PIPELINE_STREAM_DURATION}}

volumes:
  minio_data:
