name: Deploy App to Cloudflare Pages

on:
  push:
    branches: ["main"]
    paths:
      - "app/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        # VITE_MANIFEST_URL left unset so opfs.ts falls back to the R2 URL.
        run: npm run build
        env:
          VITE_PRIVATE_MANIFEST_URL: ${{ vars.VITE_PRIVATE_MANIFEST_URL }}

      - name: Deploy to Cloudflare Pages
        working-directory: app
        run: |
          # Strip non-ASCII characters from the commit subject to avoid Cloudflare
          # API error 8000111 ("Invalid commit message, must be valid UTF-8").
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' | LC_ALL=C tr -cd '[:print:]' | cut -c1-72)
          npx wrangler pages deploy dist \
            --project-name=arktrace \
            --branch=main \
            --commit-dirty=true \
            --commit-message="${COMMIT_MSG}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
