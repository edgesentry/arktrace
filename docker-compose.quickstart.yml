# arktrace quickstart — no repo clone needed.
#
# Usage:
#   curl -fsSL https://raw.githubusercontent.com/edgesentry/arktrace/main/docker-compose.quickstart.yml -o docker-compose.yml
#   docker compose up
#
# Open http://localhost:8000
#
# First run: demo data is pulled automatically from R2 (no credentials needed).
# Analyst briefs: disabled by default. See "Enable analyst briefs" below.
#
# Docs: https://github.com/edgesentry/arktrace

services:
  arktrace:
    image: ghcr.io/edgesentry/arktrace:latest
    container_name: arktrace
    ports:
      - "${PORT:-8000}:8000"
    environment:
      ARKTRACE_REGION: ${ARKTRACE_REGION:-singapore}
      AUTO_PULL: "1"
      # ── Enable analyst briefs (Option A: Anthropic API) ───────────────────
      # Uncomment and set your key:
      # LLM_PROVIDER: anthropic
      # LLM_API_KEY: sk-ant-...
      # LLM_MODEL: claude-haiku-4-5-20251001
      #
      # ── Enable analyst briefs (Option B: local GGUF model) ────────────────
      # 1. Download a model, e.g.:
      #    mkdir -p models
      #    huggingface-cli download bartowski/Qwen2.5-7B-Instruct-GGUF \
      #        Qwen2.5-7B-Instruct-Q4_K_M.gguf --local-dir models/
      # 2. Uncomment:
      # LLM_MODEL: Qwen2.5-7B-Instruct-Q4_K_M.gguf
      # And uncomment the models volume mount below.
    volumes:
      - arktrace-data:/root/.arktrace/data
      # Uncomment to mount a local GGUF model for local LLM inference:
      # - ./models:/models:ro
    restart: unless-stopped

volumes:
  arktrace-data:
    driver: local
